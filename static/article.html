<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | Aryan Kasat</title>
  
  <!-- Fonts (Inter Sans-Serif & Fira Code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- CSS Link (reusing index.css styles for markdown elements) -->
  <link rel="stylesheet" href="index.css">
  
  <style>
    body {
      background-color: var(--bg-secondary);
      padding: 40px 0;
    }
    .article-container {
      max-width: 960px;
      margin: 0 auto;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 48px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 32px;
      transition: color var(--transition-speed);
    }
    .back-btn:hover {
      color: var(--text-primary);
      text-decoration: none;
    }
    .article-header {
      margin-bottom: 32px;
      border-bottom: 2px solid var(--text-primary);
      padding-bottom: 24px;
    }
    .article-category-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      display: inline-block;
      margin-bottom: 8px;
    }
    .article-title {
      font-size: 32px;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .article-meta-info {
      font-size: 13px;
      color: var(--text-muted);
    }
    @media (max-width: 768px) {
      .article-container {
        padding: 24px;
        margin: 0 16px;
      }
      .article-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Interactive Kinetic Network Canvas Background -->
  <canvas id="kinetic-canvas"></canvas>

  <!-- Loader -->
  <div id="global-loader" class="loader">
    <div class="spinner"></div>
  </div>

  <div class="wrapper">
    <a href="/" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>Back to Portfolio</span>
    </a>

    <article class="article-container" id="article-content">
      <div id="article-placeholder">
        <p>Loading article content...</p>
      </div>
    </article>
  </div>

  <script>
    // Embedded direct controller to avoid import complexities
    const API_BASE_URL = '/api';

    document.addEventListener('DOMContentLoaded', async () => {
      setupKineticNetwork();
      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get('type');
      const id = urlParams.get('id');

      const loader = document.getElementById('global-loader');
      const contentContainer = document.getElementById('article-content');

      if (!type || !id) {
        contentContainer.innerHTML = '<p>Error: Invalid article coordinates.</p>';
        if (loader) loader.classList.add('hidden');
        return;
      }

      const endpoint = type === 'blog' ? `/blogs/${id}` : `/system-designs/${id}`;

      try {
        const response = await fetch(`${API_BASE_URL}${endpoint}`);
        if (!response.ok) throw new Error('Article not found');
        const article = await response.json();

        // Set Page Title
        document.title = `${article.title} | Aryan Kasat`;

        let content = article.content || '';
        // If content starts with H1 title, strip it to prevent duplicate title rendering
        if (content.startsWith('# ')) {
          const firstNewLine = content.indexOf('\n');
          if (firstNewLine !== -1) {
            content = content.substring(firstNewLine).trim();
          }
        }

        // Render HTML
        contentContainer.innerHTML = `
          <div class="article-header">
            <h1 class="article-title">${article.title}</h1>
          </div>
          <div class="markdown-body">
            ${parseMarkdown(content)}
          </div>
        `;
      } catch (error) {
        console.error(error);
        contentContainer.innerHTML = '<p>Error loading article. The article may not exist or the backend is unreachable.</p>';
      } finally {
        if (loader) loader.classList.add('hidden');
      }
    });

    // Custom Markdown-to-HTML Parser
    function parseMarkdown(md) {
      if (!md) return '';
      let html = md;
      
      // Math Block $$ ... $$
      html = html.replace(/\$\$\s*([\s\S]*?)\s*\$\$/g, (m, f) => `<div class="math-block">${f}</div>`);
      // Inline Math $ ... $
      html = html.replace(/\$([^$]+)\$/g, '<span style="font-style:italic; font-family:var(--font-mono); color:var(--text-primary);">$1</span>');
      // Pre blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, l, c) => {
        const esc = c.trim().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<pre><code class="language-${l}">${esc}</code></pre>`;
      });
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Headings
      html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
      html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
      html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
      // Bold / Italic
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      // Lists
      html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');

      const blocks = html.split(/\n\n+/);
      const formatted = blocks.map(b => {
        const t = b.trim();
        if (!t) return '';
        if (t.startsWith('<h') || t.startsWith('<pre') || t.startsWith('<div') || t.startsWith('<li>')) {
          return t;
        }
        if (t.startsWith('<li>')) {
          return `<ul>${t}</ul>`;
        }
        return `<p>${t}</p>`;
      });
      return formatted.join('\n');
    }

    /* Interactive Soft Kinetic Network Animation Engine */
    function setupKineticNetwork() {
      const canvas = document.getElementById('kinetic-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      
      let particles = [];
      let mouse = { x: null, y: null, radius: 160 };
      
      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      
      window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
      });
      
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
      }
      
      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 2 + 1;
          
          const colors = [
            'rgba(29, 78, 216, 0.25)', // Cobalt Blue
            'rgba(2, 132, 199, 0.20)', // Steel Blue
            'rgba(100, 116, 139, 0.20)' // Slate Gray
          ];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        
        update() {
          this.x += this.vx;
          this.y += this.vy;
          
          if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
          if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
          
          if (mouse.x !== null && mouse.y !== null) {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const distance = Math.hypot(dx, dy);
            if (distance < mouse.radius) {
              const force = (mouse.radius - distance) / mouse.radius;
              this.x += (dx / distance) * force * 0.4;
              this.y += (dy / distance) * force * 0.4;
            }
          }
        }
        
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
      }
      
      function initParticles() {
        particles = [];
        const density = Math.floor((canvas.width * canvas.height) / 10000);
        const count = Math.min(Math.max(density, 40), 120);
        for (let i = 0; i < count; i++) {
          particles.push(new Particle());
        }
      }
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.hypot(dx, dy);
            
            if (distance < 120) {
              const opacity = (1 - distance / 120) * 0.12;
              ctx.strokeStyle = `rgba(29, 78, 216, ${opacity})`;
              ctx.lineWidth = 0.8;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
          
          if (mouse.x !== null && mouse.y !== null) {
             const dx = particles[i].x - mouse.x;
             const dy = particles[i].y - mouse.y;
             const distance = Math.hypot(dx, dy);
             if (distance < mouse.radius) {
               const opacity = (1 - distance / mouse.radius) * 0.50;
               ctx.strokeStyle = `rgba(29, 78, 216, ${opacity})`;
               ctx.lineWidth = 1.2;
               ctx.beginPath();
               ctx.moveTo(particles[i].x, particles[i].y);
               ctx.lineTo(mouse.x, mouse.y);
               ctx.stroke();
             }
           }
        }
        
        requestAnimationFrame(animate);
      }
      
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      animate();
    }
  </script>
</body>
</html>
