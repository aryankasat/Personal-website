name: Keep Render App Awake

on:
  schedule:
    # Runs every 12 minutes (Render free tier spins down after 15 minutes)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          curl -I -s -o /dev/null -w "Status Code: %{http_code}\n" https://personal-website-5cfd.onrender.com/
